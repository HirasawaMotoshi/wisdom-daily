name: Hourly Pinterest Pin

on:
  schedule:
    - cron: "0 * * * *"   # 毎時0分（UTC）に起動
  workflow_dispatch:        # 手動実行ボタンも有効化

permissions:
  contents: write           # docs/ へのコミット & プッシュに必要

jobs:
  post-pin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-quote.txt

      - name: Install dependencies
        run: pip install -r requirements-quote.txt

      # フォントが存在しない場合は Inter Bold をダウンロード
      - name: Install Japanese font
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Run quote poster
        env:
          OPENROUTER_API_KEY:        ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          HF_API_TOKEN:              ${{ secrets.HF_API_TOKEN }}
          PINTEREST_ACCESS_TOKEN:    ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:        ${{ secrets.PINTEREST_BOARD_ID }}
          PAGES_BASE_URL:            ${{ secrets.PAGES_BASE_URL }}
        run: python quote_poster.py
