name: Hourly Pinterest Pin

on:
  schedule:
    - cron: "0 * * * *"   # 毎時0分（UTC）に起動
  workflow_dispatch:        # 手動実行ボタンも有効化

permissions:
  contents: write           # docs/ へのコミット & プッシュに必要

jobs:
  post-pin:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-quote.txt

      - name: Install dependencies
        run: pip install -r requirements-quote.txt

      # フォントが存在しない場合は Inter Bold をダウンロード
      - name: Download font (if missing)
        run: |
          mkdir -p fonts
          if [ ! -f fonts/Inter-Bold.ttf ]; then
            curl -fsSL \
              "https://github.com/google/fonts/raw/main/ofl/inter/Inter%5Bslnt%2Cwght%5D.ttf" \
              -o fonts/Inter-Bold.ttf || \
            apt-get install -y fonts-dejavu-core 2>/dev/null || true
          fi

      - name: Run quote poster
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          HF_API_TOKEN:              ${{ secrets.HF_API_TOKEN }}
          PINTEREST_ACCESS_TOKEN:    ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:        ${{ secrets.PINTEREST_BOARD_ID }}
          PAGES_BASE_URL:            ${{ secrets.PAGES_BASE_URL }}
        run: python quote_poster.py
